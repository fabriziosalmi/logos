server:
  host: "0.0.0.0"
  port: 3000
  read_timeout: 5s
  write_timeout: 10s
  idle_timeout: 120s
  shutdown_timeout: 10s

delivery:
  compression:
    gzip: true
  optimization:
    minify: true
    precision: 2

cache:
  strategy: "stale-while-revalidate"
  max_age: 86400
  stale_while_revalidate: 604800
  immutable_static: true
  etag: true

cors:
  allowed_origins:
    - "*"
  allow_credentials: false

security:
  csp: "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'"
  hsts: "max-age=63072000; includeSubDomains; preload"
  rate_limit:
    enabled: false
    requests_per_second: 50
    burst: 100

accessibility:
  generate_title: true
  generate_desc: true
  respect_reduced_motion: true
  respect_save_data: true

defaults:
  animation: breathe
  theme: dark
  format: favicon
  scene: pure
  texture: none
  shape: circle                    # default for everyone else (atom is reserved)

# ─── APP REGISTRY ───────────────────────────────────────────
# Slug system: /app/{slug}/{format}.svg
# Each of the 8 base colors maps to a primary app.
# Other users can add their own apps with any color.
#
# Color assignment (official):
#   blue    -> secure-proxy-manager
#   green   -> certmate / certmate-ng
#   orange  -> caddy-waf
#   purple  -> logos
#   rose    -> llmproxy
# ─────────────────────────────────────────────────────────────

apps:
  llmproxy:
    color: rose
    animation: pulse
    theme: dark
    title: LLM Proxy
    subtitle: AI Gateway
    shape: atom

  secure-proxy-manager:
    color: blue
    animation: zen
    theme: dark
    title: Secure Proxy Manager
    subtitle: Reverse Proxy
    shape: atom

  certmate:
    color: green
    animation: spin
    theme: dark
    title: Certmate
    subtitle: TLS Certificates
    shape: atom

  certmate-ng:
    color: green
    animation: smooth-spin
    theme: dark
    title: Certmate NG
    subtitle: TLS Certificates
    shape: atom

  caddy-waf:
    color: orange
    animation: radar
    theme: dark
    title: Caddy WAF
    subtitle: Web Application Firewall
    shape: atom

  logos:
    color: purple
    animation: vortex
    theme: dark
    title: Logos API
    subtitle: Generative Assets
    shape: atom
