services:
  logos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logos
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - CONFIG_PATH=/config.yaml
    volumes:
      - ./config.yaml:/config.yaml:ro
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=10m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/logos", "-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "1.0"
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
