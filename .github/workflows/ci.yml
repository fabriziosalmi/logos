name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: go build -o logos ./cmd/logos
      - name: Vet
        run: go vet ./...
      - name: Smoke test
        run: |
          ./logos &
          sleep 2
          curl -f http://localhost:3000/healthz
          curl -f http://localhost:3000/ > /dev/null
          curl -f http://localhost:3000/api/v4/render/favicon/pure/blue/spin.svg > /dev/null
          curl -f http://localhost:3000/api/v4/render/og-card/spotlight/amber/cyan/pulse.svg > /dev/null
          curl -f http://localhost:3000/api/favicon/green/pulse.svg > /dev/null
          curl -f http://localhost:3000/app/minerva/favicon.svg > /dev/null
          echo "All endpoints OK"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t logos:ci .
