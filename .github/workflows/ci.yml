name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Start server and test
        run: |
          node server.js &
          sleep 2
          curl -f http://localhost:3000/ > /dev/null
          curl -f http://localhost:3000/api/v4/render/favicon/pure/blue/spin.svg > /dev/null
          curl -f http://localhost:3000/api/v4/render/og-card/spotlight/amber/cyan/pulse.svg > /dev/null
          curl -f http://localhost:3000/api/favicon/green/pulse.svg > /dev/null
          echo "All endpoints responded successfully"
