<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>

    .orbit {
      transform-origin: 16px 16px;
      animation: spin 4s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  
  </style>
  <circle cx="16" cy="16" r="14" fill="#0a0a0c" stroke="#a855f7" stroke-width="1.5" class="outer"/>
  <ellipse cx="16" cy="16" rx="10" ry="7" fill="none" stroke="#a855f7" stroke-width="1.5" class="orbit"/>
  <g class="core">
    <circle cx="16" cy="16" r="3.5" fill="#a855f7"/>
    <circle cx="17.2" cy="14.8" r="1.2" fill="#fff" opacity="0.9"/>
  </g>
</svg>