<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>

    .orbit {
      transform-origin: 16px 16px;
      animation: blink 4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
  
  </style>
  <circle cx="16" cy="16" r="14" fill="#0a0a0c" stroke="#22c55e" stroke-width="1.5" class="outer"/>
  <ellipse cx="16" cy="16" rx="10" ry="7" fill="none" stroke="#22c55e" stroke-width="1.5" class="orbit"/>
  <g class="core">
    <circle cx="16" cy="16" r="3.5" fill="#22c55e"/>
    <circle cx="17.2" cy="14.8" r="1.2" fill="#fff" opacity="0.9"/>
  </g>
</svg>